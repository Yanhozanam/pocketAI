name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: "stable"
          cache: true

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses

      - name: Get Flutter packages
        run: flutter pub get

      - name: Find pub cache and clone llama.cpp
        run: |
          PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
          LLAMAFU_DIR=$(find "$PUB_CACHE_DIR" -type d -name "llamafu-*" 2>/dev/null | head -1)
          echo "llamafu found at: $LLAMAFU_DIR"
          if [ -n "$LLAMAFU_DIR" ]; then
            CPP_DIR="$(dirname "$(dirname "$LLAMAFU_DIR")")/llama.cpp"
          else
            CPP_DIR="$PUB_CACHE_DIR/hosted/pub.dev/llama.cpp"
          fi
          LLAMA_COMMIT="b96b82fc852b83ea6f58ffcdc264308f60f79211"
          echo "Cloning llama.cpp (pinned to $LLAMA_COMMIT) to: $CPP_DIR"
          git init "$CPP_DIR"
          cd "$CPP_DIR"
          git remote add origin https://github.com/ggml-org/llama.cpp
          git fetch --depth 1 origin "$LLAMA_COMMIT"
          git checkout FETCH_HEAD
          cd -
          echo "LLAMA_CPP_DIR=$CPP_DIR" >> $GITHUB_ENV

      - name: Patch llamafu source files for AGP 8.11 + NDK 27 compatibility
        run: |
          LLAMAFU_BUILD="$HOME/.pub-cache/hosted/pub.dev/llamafu-0.1.0/android/build.gradle"
          if [ ! -f "$LLAMAFU_BUILD" ]; then
            LLAMAFU_BUILD=$(find "$HOME/.pub-cache" -name "build.gradle" -path "*/llamafu*/android/*" 2>/dev/null | head -1)
          fi
          echo "Patching: $LLAMAFU_BUILD"
          {
            echo 'plugins {'
            echo '    id "com.android.library"'
            echo '    id "kotlin-android"'
            echo '}'
            echo ''
            echo 'android {'
            echo '    namespace "com.example.llamafu"'
            echo '    compileSdk 34'
            echo ''
            echo '    compileOptions {'
            echo '        sourceCompatibility JavaVersion.VERSION_17'
            echo '        targetCompatibility JavaVersion.VERSION_17'
            echo '    }'
            echo ''
            echo '    kotlinOptions {'
            echo "        jvmTarget = '17'"
            echo '    }'
            echo ''
            echo '    sourceSets {'
            echo '        main.java.srcDirs += "src/main/kotlin"'
            echo '    }'
            echo ''
            echo '    defaultConfig {'
            echo '        minSdk 21'
            echo '        targetSdk 34'
            echo ''
            echo '        externalNativeBuild {'
            echo '            cmake {'
            echo '                def llamaCppDir = System.getenv("LLAMA_CPP_DIR") ?: project.findProperty("llama.cpp.dir") ?: "${projectDir}/../../../llama.cpp"'
            echo '                arguments "-DLLAMA_CPP_DIR=${llamaCppDir}"'
            echo '                cppFlags "-O3", "-DNDEBUG"'
            echo '            }'
            echo '        }'
            echo '    }'
            echo ''
            echo '    externalNativeBuild {'
            echo '        cmake {'
            echo '            path "src/main/cpp/CMakeLists.txt"'
            echo '            version "3.22.1"'
            echo '        }'
            echo '    }'
            echo ''
            echo '    buildTypes {'
            echo '        release {'
            echo '            signingConfig signingConfigs.debug'
            echo '        }'
            echo '    }'
            echo '}'
            echo ''
            echo 'dependencies {'
            echo '    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"'
            echo '}'
          } > "$LLAMAFU_BUILD"

          # Patch llamafu's CMakeLists.txt: disable GGML_STATIC, add mtmd library
          LLAMAFU_CMAKE="$(dirname "$LLAMAFU_BUILD")/src/main/cpp/CMakeLists.txt"
          echo "Patching CMakeLists.txt at: $LLAMAFU_CMAKE"
          sed -i 's/set(GGML_STATIC ON)/set(GGML_STATIC OFF)/' "$LLAMAFU_CMAKE"
          sed -i '/^set(LLAMA_BUILD_EXAMPLES OFF)/a set(LLAMA_BUILD_COMMON ON)' "$LLAMAFU_CMAKE"
          sed -i '/^set(LLAMA_BUILD_EXAMPLES OFF)/a set(LLAMA_BUILD_TOOLS ON)' "$LLAMAFU_CMAKE"
          sed -i '/^set(LLAMA_BUILD_EXAMPLES OFF)/a set(LLAMA_CURL OFF)' "$LLAMAFU_CMAKE"
          sed -i '/^        ggml$/a\        mtmd' "$LLAMAFU_CMAKE"

          # Patch llama-mmap.cpp for NDK 27: posix_madvise -> madvise
          LLAMA_MMAP="$LLAMA_CPP_DIR/src/llama-mmap.cpp"
          echo "Patching llama-mmap.cpp at: $LLAMA_MMAP"
          sed -i 's/posix_madvise/madvise/g; s/POSIX_MADV_WILLNEED/MADV_WILLNEED/g; s/POSIX_MADV_RANDOM/MADV_RANDOM/g' "$LLAMA_MMAP"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-ai-apk
          path: build/app/outputs/flutter-apk/*.apk
